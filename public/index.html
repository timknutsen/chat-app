<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Login ── */
    #login-screen {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 40px 48px;
      width: min(360px, calc(100vw - 32px));
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    #login-screen h1 { font-size: 1.6rem; margin-bottom: 24px; text-align: center; color: #e94560; }
    #login-screen label { display: block; font-size: .85rem; color: #aaa; margin-bottom: 4px; }
    #login-screen input {
      width: 100%; padding: 10px 12px; margin-bottom: 16px;
      background: #0f3460; border: 1px solid #1a4a8a; border-radius: 6px;
      color: #e0e0e0; font-size: 1rem; outline: none;
    }
    #login-screen input:focus { border-color: #e94560; }
    #login-screen button {
      width: 100%; padding: 11px; background: #e94560; color: #fff;
      border: none; border-radius: 6px; font-size: 1rem; cursor: pointer;
      transition: background .2s;
    }
    #login-screen button:hover { background: #c73652; }
    #login-error { color: #e94560; font-size: .85rem; margin-top: 8px; text-align: center; min-height: 1.2em; }

    /* ── Chat ── */
    #chat-screen {
      display: none;
      flex-direction: row;
      width: min(900px, 100vw); height: min(600px, 100dvh);
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    /* Sidebar */
    #sidebar {
      width: 200px; background: #0f3460;
      display: flex; flex-direction: column;
    }
    #sidebar-header {
      padding: 16px; font-size: .85rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; color: #e94560;
      border-bottom: 1px solid #1a4a8a;
    }
    #online-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .online-user {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px; font-size: .9rem;
    }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
    #sidebar-footer { padding: 12px 16px; border-top: 1px solid #1a4a8a; }
    #current-user { font-size: .8rem; color: #aaa; margin-bottom: 8px; }
    #logout-btn {
      width: 100%; padding: 7px; background: transparent;
      border: 1px solid #e94560; color: #e94560; border-radius: 5px;
      font-size: .8rem; cursor: pointer; transition: background .2s;
    }
    #logout-btn:hover { background: #e94560; color: #fff; }

    /* Main */
    #main { flex: 1; display: flex; flex-direction: column; }
    #chat-header {
      padding: 16px 20px; border-bottom: 1px solid #0f3460;
      font-size: 1rem; font-weight: 600; color: #e0e0e0;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 8px;
    }

    /* Messages */
    .msg { display: flex; flex-direction: column; max-width: 75%; position: relative; }
    .msg.mine { align-self: flex-end; align-items: flex-end; }
    .msg.other { align-self: flex-start; }
    .msg-meta { font-size: .72rem; color: #888; margin-bottom: 2px; }
    .msg-bubble {
      padding: 8px 12px; border-radius: 10px;
      font-size: .92rem; line-height: 1.45; word-break: break-word;
    }
    .msg.mine .msg-bubble  { background: #e94560; color: #fff; border-bottom-right-radius: 2px; }
    .msg.other .msg-bubble { background: #0f3460; color: #e0e0e0; border-bottom-left-radius: 2px; }
    .system-msg {
      text-align: center; font-size: .78rem; color: #666;
      padding: 4px 0; font-style: italic;
    }

    /* Reactions */
    .reaction-bar {
      display: none; gap: 4px; margin-top: 3px;
    }
    .msg:hover .reaction-bar { display: flex; }
    .reaction-btn {
      background: #0f3460; border: 1px solid #1a4a8a; border-radius: 20px;
      padding: 2px 7px; font-size: .8rem; cursor: pointer; line-height: 1.4;
      transition: background .15s;
    }
    .reaction-btn:hover { background: #1a4a8a; }
    .reaction-pills {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px;
    }
    .reaction-pill {
      background: #0f3460; border: 1px solid #1a4a8a; border-radius: 20px;
      padding: 2px 8px; font-size: .8rem; cursor: pointer; user-select: none;
      transition: background .15s;
    }
    .reaction-pill:hover { background: #1a4a8a; }

    /* Polls */
    .poll-card {
      align-self: stretch; max-width: 100%;
      background: #0d2a4a; border: 1px solid #1a4a8a;
      border-radius: 10px; padding: 14px 16px;
    }
    .poll-meta { font-size: .72rem; color: #888; margin-bottom: 6px; }
    .poll-question { font-size: .95rem; font-weight: 600; color: #e0e0e0; margin-bottom: 12px; }
    .poll-options { display: flex; flex-direction: column; gap: 8px; }
    .poll-option { display: flex; align-items: center; gap: 10px; }
    .poll-option-btn {
      flex-shrink: 0; min-width: 64px;
      padding: 5px 12px; border-radius: 6px;
      background: #16213e; border: 1px solid #1a4a8a;
      color: #e0e0e0; font-size: .85rem; cursor: pointer;
      transition: background .15s, border-color .15s; text-align: center;
    }
    .poll-option-btn.voted { background: #e94560; border-color: #e94560; color: #fff; }
    .poll-option-btn:disabled { cursor: default; }
    .poll-bar-wrap { flex: 1; background: #16213e; border-radius: 4px; height: 8px; overflow: hidden; }
    .poll-bar { background: #e94560; height: 100%; border-radius: 4px; transition: width .3s; }
    .poll-count { font-size: .8rem; color: #aaa; min-width: 28px; text-align: right; }
    .poll-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .poll-total { font-size: .75rem; color: #888; }
    .poll-close-btn {
      padding: 3px 10px; background: transparent;
      border: 1px solid #e94560; color: #e94560; border-radius: 5px;
      font-size: .75rem; cursor: pointer; transition: background .15s;
    }
    .poll-close-btn:hover { background: #e94560; color: #fff; }

    /* Input */
    #input-row {
      display: flex; gap: 10px; padding: 14px 20px;
      border-top: 1px solid #0f3460;
    }
    #msg-input {
      flex: 1; padding: 10px 14px;
      background: #0f3460; border: 1px solid #1a4a8a; border-radius: 8px;
      color: #e0e0e0; font-size: .95rem; outline: none;
    }
    #msg-input:focus { border-color: #e94560; }
    #send-btn {
      padding: 10px 20px; background: #e94560; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      font-size: .9rem; transition: background .2s;
    }
    #send-btn:hover { background: #c73652; }
    #vote-hint { padding: 0 20px 10px; font-size: .72rem; color: #555; }
    #vote-hint code { color: #888; font-family: monospace; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      body { align-items: flex-start; }

      #login-screen { margin: auto; padding: 32px 24px; }

      #chat-screen {
        width: 100vw; height: 100dvh;
        border-radius: 0; border: none; box-shadow: none;
      }

      #sidebar { display: none; }

      .msg { max-width: 90%; }
      #messages { padding: 12px 14px; }
      #chat-header { padding: 12px 14px; }
      #input-row { padding: 10px 12px; }
      #vote-hint { padding: 0 12px 8px; }
    }

    /* Touch devices: show reaction buttons without hover */
    @media (hover: none) {
      .reaction-bar { display: flex; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <h1>💬 Chat</h1>
  <label for="username">Username</label>
  <input id="username" type="text" autocomplete="username" placeholder="e.g. simeon" />
  <label for="password">Password</label>
  <input id="password" type="password" autocomplete="current-password" placeholder="password" />
  <button id="login-btn">Sign in</button>
  <div id="login-error"></div>
</div>

<!-- Chat -->
<div id="chat-screen">
  <div id="sidebar">
    <div id="sidebar-header">Online</div>
    <div id="online-list"></div>
    <div id="sidebar-footer">
      <div id="current-user"></div>
      <button id="logout-btn">Logout</button>
    </div>
  </div>
  <div id="main">
    <div id="chat-header">General</div>
    <div id="messages"></div>
    <div id="input-row">
      <input id="msg-input" type="text" placeholder="Type a message or /vote Question…" maxlength="1000" />
      <button id="send-btn">Send</button>
    </div>
    <div id="vote-hint">📊 Poll: <code>/vote Question</code> &nbsp;·&nbsp; Custom options: <code>/vote Question | A | B | C</code></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const EMOJIS = ['👍', '❤️'];
  let socket = null;
  let myDisplayName = '';
  let unread = 0;
  let focused = true;
  const baseTitle = 'Chat';
  const myVotes = new Map(); // pollId -> optionIndex (client-local, resets on reload)

  const loginScreen = document.getElementById('login-screen');
  const chatScreen  = document.getElementById('chat-screen');
  const loginError  = document.getElementById('login-error');
  const onlineList  = document.getElementById('online-list');
  const messagesEl  = document.getElementById('messages');
  const msgInput    = document.getElementById('msg-input');
  const currentUser = document.getElementById('current-user');

  // ── Tab notification ──
  document.addEventListener('visibilitychange', () => {
    focused = !document.hidden;
    if (focused) { unread = 0; document.title = baseTitle; }
  });

  function bumpUnread() {
    if (focused) return;
    unread++;
    document.title = `(${unread}) ${baseTitle}`;
  }

  // ── Session restore ──
  fetch('/me').then(r => r.json()).then(d => { if (d.displayName) enterChat(d.displayName); }).catch(() => {});

  // ── Login ──
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    loginError.textContent = '';
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { loginError.textContent = 'Enter username and password.'; return; }
    const res = await fetch('/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (data.ok) { enterChat(data.displayName); }
    else { loginError.textContent = data.error || 'Login failed.'; }
  }

  function enterChat(displayName) {
    myDisplayName = displayName;
    currentUser.textContent = displayName;
    loginScreen.style.display = 'none';
    chatScreen.style.display  = 'flex';
    if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
      Notification.requestPermission();
    }
    connectSocket();
    msgInput.focus();
  }

  function notify(title, body) {
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted' || focused) return;
    const n = new Notification(title, { body: body.length > 100 ? body.slice(0, 97) + '…' : body });
    n.onclick = () => { window.focus(); n.close(); };
  }

  // ── Logout ──
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/logout', { method: 'POST' });
    if (socket) { socket.disconnect(); socket = null; }
    messagesEl.innerHTML = '';
    onlineList.innerHTML = '';
    chatScreen.style.display  = 'none';
    loginScreen.style.display = '';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
  });

  // ── Socket ──
  function connectSocket() {
    socket = io();

    socket.on('history', (msgs) => {
      messagesEl.innerHTML = '';
      msgs.forEach(appendMessage);
      scrollBottom();
    });

    socket.on('message', (msg) => {
      appendMessage(msg);
      scrollBottom();
      if (msg.displayName !== myDisplayName) { bumpUnread(); notify(msg.displayName, msg.text); }
    });

    socket.on('system', (text) => {
      const el = document.createElement('div');
      el.className = 'system-msg';
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollBottom();
    });

    socket.on('online', (users) => {
      onlineList.innerHTML = users.map(u =>
        `<div class="online-user"><span class="online-dot"></span>${escHtml(u)}</div>`
      ).join('');
    });

    socket.on('reaction', ({ msgId, reactions }) => {
      const wrap = messagesEl.querySelector(`[data-msg-id="${msgId}"]`);
      if (wrap) updatePills(wrap, msgId, reactions);
    });

    socket.on('poll', (poll) => {
      const existing = messagesEl.querySelector(`[data-poll-id="${poll.id}"]`);
      if (existing) { updatePollCard(existing, poll); return; }
      appendPoll(poll);
      scrollBottom();
      if (poll.creator !== myDisplayName) { bumpUnread(); notify(`Poll by ${poll.creator}`, poll.question); }
    });
  }

  // ── Messages ──
  function appendMessage(msg) {
    if (msg.type === 'poll') { appendPoll(msg); return; }
    const mine = msg.displayName === myDisplayName;
    const wrap = document.createElement('div');
    wrap.className = `msg ${mine ? 'mine' : 'other'}`;
    wrap.dataset.msgId = msg.id;

    const time = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    wrap.innerHTML = `
      <div class="msg-meta">${mine ? '' : escHtml(msg.displayName) + ' · '}${time}</div>
      <div class="msg-bubble">${escHtml(msg.text)}</div>
      <div class="reaction-bar">
        ${EMOJIS.map(e => `<button class="reaction-btn" data-emoji="${e}">${e}</button>`).join('')}
      </div>
      <div class="reaction-pills"></div>
    `;

    wrap.querySelectorAll('.reaction-btn').forEach(btn => {
      btn.addEventListener('click', () => socket.emit('react', { msgId: msg.id, emoji: btn.dataset.emoji }));
    });

    if (msg.reactions && Object.keys(msg.reactions).length) updatePills(wrap, msg.id, msg.reactions);
    messagesEl.appendChild(wrap);
  }

  function updatePills(wrap, msgId, reactions) {
    const container = wrap.querySelector('.reaction-pills');
    container.innerHTML = Object.entries(reactions).map(([emoji, count]) =>
      `<span class="reaction-pill" data-emoji="${emoji}">${emoji} ${count}</span>`
    ).join('');
    container.querySelectorAll('.reaction-pill').forEach(pill => {
      pill.addEventListener('click', () => socket.emit('react', { msgId: parseInt(msgId), emoji: pill.dataset.emoji }));
    });
  }

  // ── Polls ──
  function appendPoll(poll) {
    const card = document.createElement('div');
    card.className = 'poll-card';
    card.dataset.pollId = poll.id;
    messagesEl.appendChild(card);
    updatePollCard(card, poll);
  }

  function updatePollCard(card, poll) {
    const total = Object.values(poll.counts).reduce((a, b) => a + b, 0);
    const myVote = myVotes.has(poll.id) ? myVotes.get(poll.id) : null;
    const isMine = poll.creator === myDisplayName;

    card.innerHTML = `
      <div class="poll-meta">📊 Poll by ${escHtml(poll.creator)}</div>
      <div class="poll-question">${escHtml(poll.question)}</div>
      <div class="poll-options">
        ${poll.options.map((opt, i) => {
          const count = poll.counts[i] || 0;
          const pct = total ? Math.round(count / total * 100) : 0;
          return `<div class="poll-option">
            <button class="poll-option-btn${myVote === i ? ' voted' : ''}" data-idx="${i}"${poll.closed ? ' disabled' : ''}>${escHtml(opt)}</button>
            <div class="poll-bar-wrap"><div class="poll-bar" style="width:${pct}%"></div></div>
            <span class="poll-count">${count}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="poll-footer">
        <span class="poll-total">${poll.closed ? 'Closed' : `${total} vote${total !== 1 ? 's' : ''}`}</span>
        ${isMine && !poll.closed ? `<button class="poll-close-btn">Close poll</button>` : ''}
      </div>
    `;

    if (!poll.closed) {
      card.querySelectorAll('.poll-option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          if (myVotes.get(poll.id) === idx) { myVotes.delete(poll.id); } else { myVotes.set(poll.id, idx); }
          socket.emit('vote-poll', { pollId: poll.id, optionIndex: idx });
        });
      });
      const closeBtn = card.querySelector('.poll-close-btn');
      if (closeBtn) closeBtn.addEventListener('click', () => socket.emit('close-poll', { pollId: poll.id }));
    }
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Send ──
  document.getElementById('send-btn').addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !socket) return;
    if (text.startsWith('/vote ')) {
      const rest = text.slice(6).trim();
      if (!rest) return;
      const parts = rest.split('|').map(s => s.trim()).filter(Boolean);
      const question = parts[0];
      const options = parts.length > 1 ? parts.slice(1) : ['Yes', 'No'];
      socket.emit('create-poll', { question, options });
      msgInput.value = '';
      return;
    }
    socket.emit('message', text);
    msgInput.value = '';
  }
</script>
</body>
</html>
